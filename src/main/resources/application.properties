
# COPCOIN PROJESI ANA BAGLANTI AYARLARI 

# -- 1 PostgreSQL Baglanti Bilgileri --

# Local veya Bulut veritabanı ayarları (Ferhat)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cryptopal}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:secretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- 2 Hibernate / JPA Yapilandirmasi --
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# -- 3. Redis Bulut/Local Ayarları (Ferhat)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}


# Swagger UI URL Ayarı
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
# Spring Boot'un PostgreSQL için data.sql dosyasını zorunlu çalıştırma ayarı
spring.sql.init.mode=always

# -- 4. Google Gemini AI Entegrasyon Ayarları --
# Yapay zeka sorguları için resmi Google Gemini API adresini ve çevre değişkeninden beslenen API anahtarını tanımladık.
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
gemini.api.key=${GEMINI_API_KEY:}