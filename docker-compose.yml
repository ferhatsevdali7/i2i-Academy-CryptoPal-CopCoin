version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cryptopal-postgres
    environment:
      POSTGRES_DB: cryptopal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - cryptopal-network

  redis:
    image: redis:7-alpine
    container_name: cryptopal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cryptopal-network

volumes:
  postgres_data:
  redis_data:

networks:
  cryptopal-network:
    driver: bridge
